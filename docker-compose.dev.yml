services:
  api:
    environment:
      - LOG_FORMAT=${LOG_FORMAT:-console}
    volumes:
      - ./backend:/app/backend
      - ./SKILL.md:/app/SKILL.md:ro
      - sqlite-data:/app/data
    command: >
      uvicorn backend.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/backend
